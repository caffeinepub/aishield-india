        <!-- Google Search Console Verification -->
        <meta name="google-site-verification" content="REPLACE_WITH_YOUR_VERIFICATION_CODE" />
        
        <!-- Google Analytics with Consent Mode (DPDP Act 2023 Compliance) -->
        <script>
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          
          // Set default consent mode (denied until user accepts)
          gtag('consent', 'default', {
            'analytics_storage': 'denied',
            'ad_storage': 'denied',
            'ad_user_data': 'denied',
            'ad_personalization': 'denied'
          });
          
          // Initialize Google Analytics
          gtag('js', new Date());
          gtag('config', 'G-XXXXXXXXXX', {
            'anonymize_ip': true,
            'cookie_flags': 'SameSite=None;Secure'
          });
        </script>
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
        
        <!-- Security Headers -->
        <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://identity.ic0.app https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: https://www.google-analytics.com; connect-src 'self' https://*.ic0.app https://*.icp0.io https://www.google-analytics.com https://analytics.google.com; frame-src 'self' https://identity.ic0.app; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';">
